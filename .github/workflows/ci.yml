name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    # `develop` covers the drift lane; `master` makes the contract lock a hard gate
    # on the develop -> master promotion PR.
    branches: [main, master, develop]

jobs:
  lint-api:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
        working-directory: apps/api
      - run: uv run ruff check src tests
        working-directory: apps/api

  typecheck-api:
    name: Typecheck (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
        working-directory: apps/api
      - run: uv run mypy --strict src
        working-directory: apps/api

  test-api:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
        working-directory: apps/api
      - run: uv run pytest
        working-directory: apps/api

  lint-web:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec biome check .

  typecheck-web:
    name: Typecheck (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec tsc --noEmit

  test-web:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec vitest run

  contracts:
    name: Contracts (OpenAPI drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
        working-directory: apps/api
      # Schema parity: the live FastAPI schema (imported, no server) must match the
      # committed packages/contracts/openapi.json, modulo date-shaped defaults.
      - name: Schema parity (live schema vs committed openapi.json)
        run: uv run python ../../scripts/check_contracts.py
        working-directory: apps/api
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Types parity: regenerating the TS types from the committed schema must be a
      # no-op (catches a committed openapi.json that wasn't followed by a types regen).
      - name: Types parity (regen TS from committed schema)
        run: |
          pnpm contracts:gen:local
          git diff --exit-code packages/contracts/src/index.ts
